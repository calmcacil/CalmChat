name: Package and release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: read

jobs:
    release:
        permissions:
            contents: write
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

        steps:
          - name: Clone project
            uses: actions/checkout@v4
            with:
                fetch-depth: 0

          - name: Validate semantic tag and version sync
            shell: bash
            run: |
                set -euo pipefail

                tag="${GITHUB_REF_NAME}"
                semver_regex='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
                if [[ ! "$tag" =~ $semver_regex ]]; then
                    echo "error: tag '$tag' is not valid semantic versioning" >&2
                    exit 1
                fi

                [[ -f VERSION ]] || { echo "error: VERSION is missing" >&2; exit 1; }
                version_file=$(tr -d '\r\n' < VERSION)
                tag_version="${tag#v}"
                if [[ "$version_file" != "$tag_version" ]]; then
                    echo "error: VERSION '$version_file' does not match tag '$tag_version'" >&2
                    exit 1
                fi

          - name: Install Lua 5.1
            run: sudo apt-get update && sudo apt-get install -y lua5.1

          - name: Run static checks
            run: bash scripts/check-static.sh

          - name: Package and release
            uses: BigWigsMods/packager@v2
